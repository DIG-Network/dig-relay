name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: fmt
        run: cargo fmt --all --check
      # --locked: fail if Cargo.lock is stale vs Cargo.toml (e.g. a version bump not mirrored into
      # the lockfile). release.yml builds with --locked, so without this the PR gate would pass a
      # drift that only the release then catches — a red release after a green PR.
      - name: clippy
        run: cargo clippy --all-targets --locked -- -D warnings
      # nextest natively detects+reports flaky tests (failed-then-passed on retry) instead of
      # silently hiding them; --retries 2 absorbs environmental flakiness without masking a real
      # regression (a test failing all 3 attempts still fails the job).
      - name: test (nextest, flaky-aware)
        run: cargo nextest run --all --locked --retries 2
      - name: build (release)
        run: cargo build --release --locked

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@nextest
      # Unit + integration coverage, CI-gated at >=80% lines.
      #
      # `win_service.rs` is the Windows SCM dispatcher (`#[cfg(windows)]`); it never compiles on
      # ubuntu-latest, so it is absent from the Linux report. The explicit --ignore-filename-regex
      # keeps the gate identical no matter the runner (it would never count platform code that the
      # runner can neither build nor execute). The remaining uncovered surface is the OS-service
      # install/start/stop syscall wrappers in service.rs (would mutate the host's systemd/SCM) and
      # the binary's runtime/IO entrypoints in main.rs (build a tokio runtime, parse real argv,
      # write stdout) — both intentionally exercised via the binary in tests/cli.rs rather than
      # unit-tested. All pure/own logic is covered.
      - name: coverage (>=80% lines, nextest)
        run: >-
          cargo llvm-cov nextest --all
          --retries 2
          --ignore-filename-regex 'win_service\.rs'
          --fail-under-lines 80

  # Dependency hygiene: RustSec advisories + license allowlist + banned/duplicate crates + trusted
  # sources, all enforced by `deny.toml`. Handled advisories (e.g. the launchd-only quick-xml chain,
  # not reachable by dig-relay) are documented + ignored there with a rationale; anything new fails.
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
