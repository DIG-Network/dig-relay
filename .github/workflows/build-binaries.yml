# The ONE place dig-relay's cross-OS binary build lives. It is a REUSABLE workflow
# (`on: workflow_call` only — it never fires on its own): both release paths call it, so the
# OS/arch matrix + toolchain setup are defined exactly once (DRY, CLAUDE.md §2.5):
#
#   * release.yml          — the STABLE `vX.Y.Z` tag builder, and
#   * nightly-release.yml   — the NIGHTLY pre-release channel.
#
# The caller passes the version string stamped into each artifact's filename and, optionally,
# the git ref to build. The job builds the self-contained `dig-relay` server binary for every
# supported OS/arch and uploads them as run artifacts the caller's publish job then attaches to a
# GitHub Release.
#
# ASSET NAMING — each binary is published as `dig-relay-<ver>-<os>-<arch>[.exe]`, the CANONICAL
# name the dig-installer thin-shim expects (its dig-relay Repo stem is `dig-relay`; matched by
# dig-installer/src/asset.rs::select_asset against the os_arch slugs
# {windows-x64, linux-x64, macos-arm64, macos-x64}).
#
# dig-relay's dependency graph is pure-Rust TLS (rustls), so there is NO openssl-sys in any
# target's graph and every target builds without a cross C-toolchain (macos-x64 is cross-compiled
# on the Apple-silicon runner). A linux-arm64 cross-compile would be clean too; it is omitted to
# match the installer's x64-only Linux matrix — add it when an arm64-Linux consumer appears.
#
# The gate runs fmt + clippy only — a PR's own CI (ci.yml) already ran the full
# fmt/clippy/test/coverage set against the merged tree before merge (§2.4a). fmt/clippy are
# deterministic (never flaky), so they stay as a cheap fail-fast before spending build minutes;
# re-running the test suite on the release path is redundant flake-exposure that has blocked a
# release before (#488).
name: Build binaries (reusable)

on:
  workflow_call:
    inputs:
      version:
        description: "Version string stamped into each artifact filename (e.g. `1.2.3` or `1.2.3-nightly.20260714.abc1234`)."
        type: string
        required: true
      ref:
        description: "Git ref (tag / branch / SHA) to check out and build. Empty = the caller run's commit."
        type: string
        required: false
        default: ""

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  # Gate: fmt + clippy once on Linux (fast, deterministic, non-flaky). A ref that fails the gate
  # never produces binaries. Tests are NOT re-run here — see the header comment.
  check:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - name: Install Rust (stable + components)
        run: |
          rustup toolchain install stable --component rustfmt --component clippy
          rustup default stable
          rustc --version
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-relay-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-relay-check-
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --locked -- -D warnings

  build:
    name: build (${{ matrix.out_name }})
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: dig-relay.exe
            out_name: windows-x64.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: dig-relay
            out_name: linux-x64
          - os: macos-14 # Apple silicon (arm64)
            target: aarch64-apple-darwin
            bin: dig-relay
            out_name: macos-arm64
          - os: macos-14 # Apple silicon — cross-compiles the Intel binary
            target: x86_64-apple-darwin
            bin: dig-relay
            out_name: macos-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - name: Install Rust + target
        shell: bash
        run: |
          rustup toolchain install stable
          rustup default stable
          rustup target add ${{ matrix.target }}
          rustc --version
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-relay-build-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-relay-build-${{ matrix.target }}-
      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }} --bin dig-relay
      - name: Stage artifact
        # The caller's `version` is stamped into the filename verbatim: a plain `1.2.3` for a
        # stable tag, or the synthesized `1.2.3-nightly.YYYYMMDD.<shortsha>` for a nightly.
        shell: bash
        run: |
          VER="${{ inputs.version }}"
          mkdir -p dist
          SRC="target/${{ matrix.target }}/release/${{ matrix.bin }}"
          test -f "$SRC" || { echo "binary not produced: $SRC"; exit 1; }
          # `out_name` already carries the .exe on Windows; unix has no extension.
          cp "$SRC" "dist/dig-relay-${VER}-${{ matrix.out_name }}"
          ls -la dist
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dig-relay-${{ matrix.out_name }}
          path: dist/*
          if-no-files-found: error
